name: Weekly Review (Sexta 16:00 ET)

on:
  schedule:
    - cron: "0 20 * * 5"     # 16:00 ET sexta (UTC-4, EDT)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/autonomous-trading-agent-XbWUX
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      - name: Run routine
        run: ROUTINE=weekly node agent/src/agent.js
        env:
          ALPACA_API_KEY:       ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:    ${{ secrets.ALPACA_SECRET_KEY }}
          PERPLEXITY_API_KEY:   ${{ secrets.PERPLEXITY_API_KEY }}
          CLICKUP_API_TOKEN:    ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID:      ${{ secrets.CLICKUP_LIST_ID }}

      - name: Persist memory
        run: |
          git config user.email "agent@chatcorelab.com"
          git config user.name "Trading Agent"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/miguelangelocarreira/chatcorelab.git
          git add memory/ AGENT_STATE.md agent/memory/
          git commit -m "chore: persist [weekly] $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty
          git push origin claude/autonomous-trading-agent-XbWUX
